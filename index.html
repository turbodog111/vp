<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>♟</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111; color: #ccc;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 10px; min-height: 100vh;
    }
    #hdr {
      text-align: center; font-size: 11px; color: #444;
      padding: 2px 0 10px; letter-spacing: 0.07em;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }
    .panel {
      background: #1a1a1a; border-radius: 7px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .pbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 9px; background: #222; gap: 8px; min-height: 30px;
    }
    .pbar.on-move { background: #2c2c2c; }
    .pname { font-size: 12px; font-weight: 600; color: #ddd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pclk { font-family: 'Courier New', monospace; font-size: 13px; color: #555; letter-spacing: 0.02em; flex-shrink: 0; }
    .pclk.live { color: #eee; }
    .pclk.low  { color: #e44 !important; }
    .board-wrap { position: relative; width: 100%; padding-top: 100%; background: #000; }
    .board {
      position: absolute; inset: 0;
      display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
    }
    .sq { display: flex; align-items: center; justify-content: center; font-size: clamp(13px, 3vw, 28px); user-select: none; }
    .sq.ls { background: #f0d9b5; }
    .sq.ds { background: #b58863; }
    .sq.hl { filter: brightness(1.3); }
    .wp { color: #fff; -webkit-text-stroke: 0.4px #444; text-shadow: 0 1px 3px rgba(0,0,0,.9); }
    .bp { color: #111; -webkit-text-stroke: 0.3px rgba(255,255,255,.4); }
    .moves {
      padding: 5px 9px 7px; font-size: 11px; line-height: 1.8;
      max-height: 60px; overflow-y: auto; border-top: 1px solid #222; color: #666; flex-shrink: 0;
    }
    .mn { color: #444; margin-right: 1px; }
    .mv { color: #bbb; margin-right: 4px; }
    .res { display: inline-block; background: #2a2a2a; color: #777; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 3px; }
    #sbar { text-align: center; font-size: 10px; color: #2e2e2e; padding: 8px 0 2px; letter-spacing: 0.05em; }
  </style>
</head>
<body>

<div id="hdr">♟ &nbsp;·&nbsp; R10 &nbsp;·&nbsp; 9 Apr &nbsp;·&nbsp; 14:45 CEST &nbsp;<span id="cd"></span></div>
<div class="grid" id="grid"></div>
<div id="sbar">—</div>

<script>
// ═══════════════════════════════════════════════════════
// MINIMAL INLINE CHESS ENGINE — no external dependencies
// ═══════════════════════════════════════════════════════

const INIT_FEN = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';

function sqNum(s) { return (8 - +s[1]) * 8 + (s.charCodeAt(0) - 97); }
function sqStr(i) { return String.fromCharCode(97 + i % 8) + (8 - Math.floor(i / 8)); }

function parseFen(fen) {
  const [pos, turn, castling, ep] = fen.split(' ');
  const board = Array(64).fill('');
  let i = 0;
  for (const ch of pos) {
    if (ch === '/') continue;
    if (/\d/.test(ch)) i += +ch; else board[i++] = ch;
  }
  return { board, turn, castling, ep };
}

function toFen({ board, turn, castling, ep }) {
  let pos = '';
  for (let r = 0; r < 8; r++) {
    let e = 0;
    for (let f = 0; f < 8; f++) {
      const p = board[r * 8 + f];
      if (!p) { e++; }
      else { if (e) { pos += e; e = 0; } pos += p; }
    }
    if (e) pos += e;
    if (r < 7) pos += '/';
  }
  return `${pos} ${turn} ${castling || '-'} ${ep || '-'} 0 1`;
}

const DIAG = [[-1,-1],[-1,1],[1,-1],[1,1]];
const ORTH = [[-1,0],[1,0],[0,-1],[0,1]];
const BOTH = [...DIAG,...ORTH];

function slideTo(board, from, to, dirs) {
  const fr = Math.floor(from/8), ff = from%8;
  for (const [dr, dc] of dirs) {
    let r = fr+dr, c = ff+dc;
    while (r>=0 && r<8 && c>=0 && c<8) {
      const s = r*8+c;
      if (s === to) return true;
      if (board[s]) break;
      r+=dr; c+=dc;
    }
  }
  return false;
}

function attacks(board, from, to, piece) {
  const pt = piece.toUpperCase();
  const dr = Math.floor(to/8)-Math.floor(from/8), dc = to%8-from%8;
  switch(pt) {
    case 'N': { const a=Math.abs(dr),b=Math.abs(dc); return (a===2&&b===1)||(a===1&&b===2); }
    case 'B': return Math.abs(dr)===Math.abs(dc) && dr!==0 && slideTo(board,from,to,DIAG);
    case 'R': return (dr===0||dc===0) && !(dr===0&&dc===0) && slideTo(board,from,to,ORTH);
    case 'Q': return attacks(board,from,to,'B')||attacks(board,from,to,'R');
    case 'K': return Math.abs(dr)<=1 && Math.abs(dc)<=1 && !(dr===0&&dc===0);
    case 'P': {
      const dir = piece==='P'?-1:1;
      return dr===dir && Math.abs(dc)===1;
    }
  }
  return false;
}

function applyMove(state, san) {
  let { board, turn, castling, ep } = state;
  san = san.replace(/[+#!?]/g,'');

  // Castling
  if (san==='O-O'||san==='O-O-O') {
    const row = turn==='w'?7:0;
    const kf=row*8+4, kt=row*8+(san==='O-O'?6:2);
    const rf=row*8+(san==='O-O'?7:0), rt=row*8+(san==='O-O'?5:3);
    board[kt]=board[kf]; board[kf]='';
    board[rt]=board[rf]; board[rf]='';
    castling=castling.replace(turn==='w'?/[KQ]/g:/[kq]/g,'');
    state.castling=castling||'-'; state.ep='-';
    state.turn=turn==='w'?'b':'w'; return;
  }

  // Promotion
  let promo=null;
  const pm=san.match(/=([QRBN])/i);
  if(pm){ promo=turn==='w'?pm[1].toUpperCase():pm[1].toLowerCase(); san=san.replace(/=[QRBN]/i,''); }

  const isCapture=san.includes('x');
  san=san.replace('x','');

  let pieceType, disambig, targetStr;
  if(/^[A-Z]/.test(san)){
    pieceType=san[0];
    const rest=san.slice(1); targetStr=rest.slice(-2); disambig=rest.slice(0,-2);
  } else {
    pieceType='P'; targetStr=san.slice(-2); disambig=san.slice(0,-2);
  }

  const piece=turn==='w'?pieceType:pieceType.toLowerCase();
  const to=sqNum(targetStr);

  // Find all candidate from-squares
  const cands=[];
  for(let i=0;i<64;i++) if(board[i]===piece) cands.push(i);

  const from=cands.find(f=>{
    // Disambiguation filter
    if(disambig.length===2 && f!==sqNum(disambig)) return false;
    if(disambig.length===1){
      if(/[a-h]/.test(disambig)&&f%8!==disambig.charCodeAt(0)-97) return false;
      if(/[1-8]/.test(disambig)&&Math.floor(f/8)!==8-parseInt(disambig)) return false;
    }
    // Movement validation
    if(pieceType==='P'){
      const dir=turn==='w'?-1:1, fr=Math.floor(f/8), ff=f%8;
      const tr=Math.floor(to/8), tf=to%8;
      if(isCapture){
        if(tr-fr!==dir||Math.abs(tf-ff)!==1) return false;
        return !!board[to]||sqStr(to)===ep;
      } else {
        if(ff!==tf) return false;
        if(tr-fr===dir&&!board[to]) return true;
        const sr=turn==='w'?6:1;
        return fr===sr&&tr-fr===2*dir&&!board[to]&&!board[(fr+dir)*8+ff];
      }
    }
    return attacks(board,f,to,piece);
  });

  if(from==null) return; // shouldn't happen with valid moves

  // En passant capture
  if(pieceType==='P'&&isCapture&&!board[to]) board[Math.floor(from/8)*8+to%8]='';

  // Update EP state
  const fr=Math.floor(from/8), tf2=from%8;
  if(pieceType==='P'&&Math.abs(Math.floor(to/8)-fr)===2)
    state.ep=sqStr(Math.floor((fr+Math.floor(to/8))/2)*8+tf2);
  else state.ep='-';

  // Move piece
  board[to]=promo||piece; board[from]='';

  // Update castling rights
  if(pieceType==='K'){ castling=castling.replace(turn==='w'?/[KQ]/g:/[kq]/g,''); state.castling=castling||'-'; }
  if(pieceType==='R'){
    if(from===0)  castling=castling.replace('q','');
    if(from===7)  castling=castling.replace('k','');
    if(from===56) castling=castling.replace('Q','');
    if(from===63) castling=castling.replace('K','');
    state.castling=castling||'-';
  }
  state.turn=turn==='w'?'b':'w';
}

function fenFromMoves(movesStr) {
  const state = parseFen(INIT_FEN);
  const tokens = movesStr.trim().split(/\s+/);
  for (const t of tokens) {
    if (!t || /^\d+\./.test(t) || t==='*' || t==='1-0' || t==='0-1' || t==='1/2-1/2') continue;
    try { applyMove(state, t); } catch(_) {}
  }
  return { fen: toFen(state), turn: state.turn };
}

// ═══════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════

const GAMES = [
  { id: 'UO81qK9U', white: 'Esipenko',  black: 'Bluebaum' },
  { id: 'RN9BrHlK', white: 'Sindarov',  black: 'Pragg'    },
  { id: 'rnuH0n1M', white: 'Wei Yi',    black: 'Caruana'  },
  { id: 'Uav0LRGT', white: 'Giri',      black: 'Nakamura' },
];

// Primary: corsproxy.io  |  Fallback: allorigins.win
const LICHESS_PGN = 'https://lichess.org/broadcast/fide-candidates-2026-open/round-10/G3oSxPgs.pgn';
const PROXIES = [
  'https://corsproxy.io/?' + LICHESS_PGN,
  'https://api.allorigins.win/raw?url=' + encodeURIComponent(LICHESS_PGN),
];
let proxyIdx = 0;

const ROUND_START = new Date('2026-04-09T12:45:00Z'); // 14:45 CEST

const SYM = { K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙', k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟' };

// ── Build DOM ────────────────────────────────────────────────────────────────

const grid = document.getElementById('grid');
for (const g of GAMES) {
  const div = document.createElement('div');
  div.className = 'panel';
  div.innerHTML = `
    <div class="pbar" id="bb-${g.id}"><span class="pname">${g.black}</span><span class="pclk" id="bc-${g.id}">—</span></div>
    <div class="board-wrap"><div class="board" id="bd-${g.id}"></div></div>
    <div class="pbar" id="wb-${g.id}"><span class="pname">${g.white}</span><span class="pclk" id="wc-${g.id}">—</span></div>
    <div class="moves" id="mv-${g.id}">—</div>`;
  grid.appendChild(div);
  drawBoard(g.id, INIT_FEN, null, null);
}

// ── Board rendering ───────────────────────────────────────────────────────────

function sqIdx(sq) { return (8 - +sq[1]) * 8 + (sq.charCodeAt(0) - 97); }

function drawBoard(id, fen, fromSq, toSq) {
  const el = document.getElementById('bd-' + id);
  if (!el) return;
  const hlFrom = fromSq ? sqIdx(fromSq) : -1;
  const hlTo   = toSq   ? sqIdx(toSq)   : -1;
  const rows = fen.split(' ')[0].split('/');
  let html = '', idx = 0;
  for (let r = 0; r < 8; r++) {
    let file = 0;
    for (const ch of rows[r]) {
      if (/\d/.test(ch)) {
        const n = +ch;
        for (let i = 0; i < n; i++) {
          html += `<div class="sq ${(r+file)%2===0?'ls':'ds'}${idx===hlFrom||idx===hlTo?' hl':''}"></div>`;
          file++; idx++;
        }
      } else {
        const isW = ch === ch.toUpperCase();
        html += `<div class="sq ${(r+file)%2===0?'ls':'ds'}${idx===hlFrom||idx===hlTo?' hl':''}">` +
                `<span class="${isW?'wp':'bp'}">${SYM[ch]||''}</span></div>`;
        file++; idx++;
      }
    }
  }
  el.innerHTML = html;
}

// ── Clocks ────────────────────────────────────────────────────────────────────

function fmtClk(t) {
  if (!t) return '—';
  const [h, m, s] = t.split(':').map(Number);
  return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
}

function isLow(t) {
  if (!t) return false;
  const [h, m] = t.split(':').map(Number);
  return h === 0 && m < 1;
}

// ── PGN parsing ───────────────────────────────────────────────────────────────

function parseAll(text) {
  const chunks = text.split(/(?=\[Event )/).filter(c => c.trim().length > 5);
  const out = {};
  for (const chunk of chunks) {
    const hdrs = {};
    for (const m of chunk.matchAll(/\[(\w+) "([^"]*)"\]/g)) hdrs[m[1]] = m[2];
    const site = hdrs.Site || '';
    const game = GAMES.find(g => site.includes(g.id));
    if (!game) continue;

    // Clocks: even indices = white, odd = black
    const clks = [...chunk.matchAll(/\[%clk (\d+:\d+:\d+)\]/g)].map(m => m[1]);
    const wClk = clks.filter((_,i)=>i%2===0).at(-1) ?? null;
    const bClk = clks.filter((_,i)=>i%2!==0).at(-1) ?? null;

    // Extract move section (after blank line following headers)
    const parts = chunk.split(/\n\n+/);
    const moveSection = parts.find(p => !p.trim().startsWith('[')) || '';

    // Strip comments, extract clean move list
    const stripped = moveSection.replace(/\{[^}]*\}/g,'').replace(/;[^\n]*/g,'').trim();
    const moveTokens = stripped.split(/\s+/).filter(t => t && !/^\d+\./.test(t) && !['*','1-0','0-1','1/2-1/2'].includes(t));

    // Last move for highlighting (before applying all moves to get final state)
    // We extract from-/to- from the last two tokens in the last move pair
    let fen = INIT_FEN, turn = 'w', fromSq = null, toSq = null;
    if (moveTokens.length > 0) {
      const state = parseFen(INIT_FEN);
      for (const t of moveTokens) {
        try {
          // Capture last move's to-square before applying
          const priorFen = toFen(state);
          applyMove(state, t);
          const newFen = toFen(state);
          if (priorFen !== newFen) {
            // Find which squares changed to detect from/to
            const before = parseFen(priorFen).board;
            const after  = state.board;
            const changed = [];
            for (let i = 0; i < 64; i++) if (before[i] !== after[i]) changed.push(i);
            if (changed.length >= 2) {
              // from = square that lost a piece of the mover's color
              const moverColor = priorFen.split(' ')[1];
              const lostSq = changed.find(i => {
                const p = before[i];
                return p && (moverColor==='w' ? p===p.toUpperCase() : p===p.toLowerCase()) && !after[i];
              });
              const gainedSq = changed.find(i => {
                const p = after[i];
                return p && i !== lostSq;
              });
              if (lostSq!=null) fromSq = sqStr(lostSq);
              if (gainedSq!=null) toSq = sqStr(gainedSq);
            }
          }
        } catch(_) {}
      }
      fen  = toFen(state);
      turn = state.turn;
    }

    out[game.id] = { wClk, bClk, fen, turn, moves: moveTokens, fromSq, toSq, res: hdrs.Result||'*' };
  }
  return out;
}

// ── Panel update ──────────────────────────────────────────────────────────────

function updatePanel(id, d) {
  const { wClk, bClk, fen, turn, moves, fromSq, toSq, res } = d;
  const started = moves.length > 0 || res !== '*';

  drawBoard(id, fen, fromSq, toSq);

  const wLive = started && res==='*' && turn==='w';
  const bLive = started && res==='*' && turn==='b';

  for (const [side, clk, live] of [['w', wClk, wLive], ['b', bClk, bLive]]) {
    const ce = document.getElementById(`${side}c-${id}`);
    const be = document.getElementById(`${side}b-${id}`);
    ce.textContent = fmtClk(clk);
    ce.className = 'pclk' + (live?' live':'') + (isLow(clk)?' low':'');
    be.className  = 'pbar' + (live?' on-move':'');
  }

  const ml = document.getElementById('mv-' + id);
  if (!started) { ml.innerHTML = res!=='*' ? `<span class="res">${res}</span>` : '—'; return; }

  // Build move list — pair moves into "1. e4 e5" format
  let html = '';
  for (let i = 0; i < moves.length; i++) {
    if (i%2===0) html += `<span class="mn">${Math.floor(i/2)+1}.</span>`;
    html += `<span class="mv">${moves[i]}</span>`;
  }
  if (res!=='*') html += `<span class="res">${res}</span>`;
  ml.innerHTML = html;
  ml.scrollTop = ml.scrollHeight;
}

// ── Countdown ─────────────────────────────────────────────────────────────────

function tick() {
  const diff = ROUND_START - Date.now();
  const el = document.getElementById('cd');
  if (diff > 0) {
    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
    el.textContent = `· ${h}h ${m}m`;
  } else {
    el.textContent = '';
  }
}
tick(); setInterval(tick, 30000);

// ── Poll ──────────────────────────────────────────────────────────────────────

async function poll() {
  try {
    const res = await fetch(PROXIES[proxyIdx], { cache: 'no-store' });
    if (!res.ok) throw new Error(`${res.status}`);
    const text = await res.text();
    const games = parseAll(text);
    for (const [id, data] of Object.entries(games)) updatePanel(id, data);
    const t = new Date();
    document.getElementById('sbar').textContent =
      `↻ ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;
  } catch(e) {
    // Try the next proxy on failure
    proxyIdx = (proxyIdx + 1) % PROXIES.length;
    document.getElementById('sbar').textContent = '⚠ ' + e.message + ' — retrying…';
  }
}

poll(); setInterval(poll, 4000);
</script>
</body>
</html>
