<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vp</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --panel: rgba(255, 255, 255, 0.05);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f4f4f5;
      --muted: rgba(244, 244, 245, 0.55);
      --accent: #fb923c;
      --accent-strong: #f97316;
      --danger: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(249, 115, 22, 0.18), transparent 34%),
        radial-gradient(circle at bottom, rgba(251, 191, 36, 0.1), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
    }

    form {
      width: 100%;
    }

    .shell {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
    }

    input,
    button,
    a {
      border: 0;
      outline: 0;
      font: inherit;
    }

    input {
      min-width: 0;
      background: transparent;
      color: var(--text);
      padding: 18px 20px;
      font-size: clamp(18px, 2.8vw, 24px);
      letter-spacing: 0.01em;
    }

    input::placeholder {
      color: var(--muted);
    }

    button,
    .download {
      display: inline-grid;
      place-items: center;
      min-width: 68px;
      padding: 0 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #140b04;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    button:hover,
    .download:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
    }

    .meta {
      min-height: 26px;
      margin-top: 14px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .meta[data-error="true"] {
      color: var(--danger);
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .download[hidden] {
      display: none;
    }

    @media (max-width: 640px) {
      .shell {
        grid-template-columns: 1fr;
      }

      button,
      .download {
        min-height: 60px;
      }
    }
  </style>
</head>
<body>
  <main>
    <form id="form">
      <div class="shell">
        <input
          id="url"
          name="url"
          type="url"
          inputmode="url"
          autocomplete="off"
          spellcheck="false"
          placeholder="paste youtube link"
          aria-label="YouTube URL"
          required
        >
        <button id="submit" type="submit" aria-label="Render">go</button>
      </div>
      <div id="meta" class="meta" aria-live="polite"></div>
      <div class="actions">
        <a id="download" class="download" href="#" hidden>download mp4</a>
      </div>
    </form>
  </main>

  <script>
    const COBALT_BASE = "https://cobalt.meowing.de/";

    const form = document.getElementById("form");
    const urlInput = document.getElementById("url");
    const submitButton = document.getElementById("submit");
    const meta = document.getElementById("meta");
    const download = document.getElementById("download");

    function setMeta(text, isError = false) {
      meta.textContent = text;
      meta.dataset.error = isError ? "true" : "false";
    }

    function resetDownload() {
      download.hidden = true;
      download.href = "#";
      download.removeAttribute("download");
    }

    function cobaltUrl(value) {
      return `${COBALT_BASE}?u=${encodeURIComponent(value)}`;
    }

    function syncDownload() {
      const value = urlInput.value.trim();
      const valid = value && /^https?:\/\//i.test(value);

      if (!valid) {
        resetDownload();
        return;
      }

      download.href = cobaltUrl(value);
      download.target = "_blank";
      download.rel = "noopener";
      download.hidden = false;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const value = urlInput.value.trim();

      try {
        const next = new URL(value);
        if (!/^https?:$/i.test(next.protocol)) {
          throw new Error();
        }

        setMeta("");
        window.location.href = cobaltUrl(value);
      } catch (error) {
        setMeta("invalid link", true);
      }
    });

    urlInput.addEventListener("input", () => {
      setMeta("");
      syncDownload();
    });

    syncDownload();
  </script>
</body>
</html>
