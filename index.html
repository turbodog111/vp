<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vp</title>
  <script
    src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit"
    defer
  ></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --panel: rgba(255, 255, 255, 0.05);
      --line: rgba(255, 255, 255, 0.1);
      --text: #f4f4f5;
      --muted: rgba(244, 244, 245, 0.55);
      --accent: #fb923c;
      --accent-strong: #f97316;
      --danger: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(249, 115, 22, 0.18), transparent 34%),
        radial-gradient(circle at bottom, rgba(251, 191, 36, 0.1), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
    }

    form {
      width: 100%;
    }

    .shell {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
    }

    input,
    button,
    a {
      border: 0;
      outline: 0;
      font: inherit;
    }

    input {
      min-width: 0;
      background: transparent;
      color: var(--text);
      padding: 18px 20px;
      font-size: clamp(18px, 2.8vw, 24px);
      letter-spacing: 0.01em;
    }

    input::placeholder {
      color: var(--muted);
    }

    button,
    .download {
      display: inline-grid;
      place-items: center;
      min-width: 68px;
      padding: 0 24px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #140b04;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease;
    }

    button:hover,
    .download:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
    }

    .meta {
      min-height: 26px;
      margin-top: 14px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.03em;
    }

    .meta[data-error="true"] {
      color: var(--danger);
    }

    .actions {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .challenge-wrap {
      display: none;
      justify-content: center;
      margin-top: 18px;
    }

    .challenge-wrap.is-visible {
      display: flex;
    }

    #challenge {
      min-height: 65px;
    }

    .download[hidden] {
      display: none;
    }

    @media (max-width: 640px) {
      .shell {
        grid-template-columns: 1fr;
      }

      button,
      .download {
        min-height: 60px;
      }
    }
  </style>
</head>
<body>
  <main>
    <form id="form">
      <div class="shell">
        <input
          id="url"
          name="url"
          type="url"
          inputmode="url"
          autocomplete="off"
          spellcheck="false"
          placeholder="paste youtube link"
          aria-label="YouTube URL"
          required
        >
        <button id="submit" type="submit" aria-label="Render">go</button>
      </div>
      <div id="meta" class="meta" aria-live="polite"></div>
      <div class="actions">
        <a id="download" class="download" href="#" hidden>download mp4</a>
      </div>
      <div id="challengeWrap" class="challenge-wrap">
        <div id="challenge"></div>
      </div>
    </form>
  </main>

  <script>
    const API_BASE = "https://cobalt-api.meowing.de";

    const form = document.getElementById("form");
    const urlInput = document.getElementById("url");
    const submitButton = document.getElementById("submit");
    const meta = document.getElementById("meta");
    const download = document.getElementById("download");
    const challengeWrap = document.getElementById("challengeWrap");

    let instanceInfo = null;
    let widgetId = null;
    let turnstileToken = "";
    let sessionToken = "";

    function setMeta(text, isError = false) {
      meta.textContent = text;
      meta.dataset.error = isError ? "true" : "false";
    }

    function resetDownload() {
      download.hidden = true;
      download.href = "#";
      download.removeAttribute("download");
    }

    function showChallenge() {
      challengeWrap.classList.add("is-visible");
    }

    function hideChallenge() {
      challengeWrap.classList.remove("is-visible");
    }

    function shortError(code) {
      const mapped = {
        "error.api.auth.jwt.missing": "verify",
        "error.api.auth.jwt.invalid": "verify again",
        "error.api.auth.jwt.expired": "verify again",
        "error.api.turnstile.failed": "verify again",
        "error.api.fetch.empty": "not found"
      };

      return mapped[code] || "couldn't render";
    }

    function renderChallenge() {
      if (!window.turnstile || widgetId !== null || !instanceInfo?.turnstileSitekey) {
        return;
      }

      widgetId = window.turnstile.render("#challenge", {
        sitekey: instanceInfo.turnstileSitekey,
        theme: "dark",
        size: "flexible",
        appearance: "interaction-only",
        callback(token) {
          turnstileToken = token;
          setMeta("");
        },
        "expired-callback"() {
          turnstileToken = "";
          sessionToken = "";
        },
        "error-callback"() {
          turnstileToken = "";
          sessionToken = "";
          setMeta("verify again", true);
          showChallenge();
        }
      });
    }

    async function loadInstance() {
      const response = await fetch(API_BASE, {
        headers: {
          Accept: "application/json"
        }
      });

      if (!response.ok) {
        throw new Error("offline");
      }

      const payload = await response.json();
      instanceInfo = payload.cobalt || {};
      renderChallenge();
    }

    async function ensureSession() {
      if (!instanceInfo?.turnstileSitekey) {
        return;
      }

      if (sessionToken) {
        return;
      }

      if (!turnstileToken) {
        showChallenge();
        throw new Error("verify");
      }

      const response = await fetch(`${API_BASE}/session`, {
        method: "POST",
        headers: {
          Accept: "application/json",
          "cf-turnstile-response": turnstileToken
        }
      });

      const payload = await response.json().catch(() => ({}));

      if (!response.ok || !payload.token) {
        sessionToken = "";
        turnstileToken = "";

        if (widgetId !== null && window.turnstile) {
          window.turnstile.reset(widgetId);
        }

        showChallenge();
        throw new Error(shortError(payload.error?.code));
      }

      sessionToken = payload.token;
      hideChallenge();
    }

    async function renderDownload(url) {
      await ensureSession();

      const headers = {
        Accept: "application/json",
        "Content-Type": "application/json"
      };

      if (sessionToken) {
        headers.Authorization = `Bearer ${sessionToken}`;
      }

      const response = await fetch(API_BASE, {
        method: "POST",
        headers,
        body: JSON.stringify({
          url,
          downloadMode: "auto",
          youtubeVideoContainer: "mp4",
          youtubeVideoCodec: "h264",
          videoQuality: "720"
        })
      });

      const payload = await response.json().catch(() => ({}));

      if (!response.ok || payload.status === "error") {
        if (payload.error?.code?.includes("jwt")) {
          sessionToken = "";
          turnstileToken = "";
          showChallenge();

          if (widgetId !== null && window.turnstile) {
            window.turnstile.reset(widgetId);
          }
        }

        throw new Error(shortError(payload.error?.code));
      }

      if (payload.status === "redirect" || payload.status === "tunnel") {
        return {
          href: payload.url,
          fileName: payload.filename || "video.mp4"
        };
      }

      if (payload.status === "picker" && Array.isArray(payload.picker) && payload.picker.length) {
        const item = payload.picker.find((entry) => entry.type === "video") || payload.picker[0];
        return {
          href: item.url,
          fileName: payload.audioFilename || "video.mp4"
        };
      }

      throw new Error("couldn't render");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      resetDownload();
      submitButton.disabled = true;
      setMeta("rendering");

      try {
        const rendered = await renderDownload(urlInput.value.trim());
        download.href = rendered.href;
        download.target = "_blank";
        download.rel = "noopener";
        download.download = rendered.fileName;
        download.hidden = false;
        setMeta("ready");
      } catch (error) {
        setMeta(error.message || "couldn't render", true);
      } finally {
        submitButton.disabled = false;
      }
    });

    loadInstance().catch(() => {
      setMeta("offline", true);
    });

    window.addEventListener("load", renderChallenge);
  </script>
</body>
</html>
