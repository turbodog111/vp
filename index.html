<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>vp</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">vp</div>
    <input id="search" type="search" placeholder="Search songs...">
    <button id="refresh" class="icon-btn" title="Refresh library">↻</button>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="library">Library</button>
    <button class="tab" data-view="playlists">Playlists</button>
  </nav>

  <main class="main">
    <section id="view-library" class="view active">
      <div class="list-header">
        <span class="col-num">#</span>
        <span class="col-title">Title</span>
        <span class="col-actions"></span>
      </div>
      <ul id="library-list" class="song-list"></ul>
      <div id="library-empty" class="empty hidden">
        No songs found. Drop <code>.mp3</code> files into the <code>songs/</code> folder, commit, and push.
      </div>
      <div id="library-error" class="empty hidden"></div>
    </section>

    <section id="view-playlists" class="view">
      <div class="playlist-toolbar">
        <button id="new-playlist">+ New playlist</button>
      </div>
      <div id="playlists-container"></div>
    </section>
  </main>

  <footer class="player">
    <div class="now-playing">
      <div class="np-title" id="np-title">Nothing playing</div>
      <div class="np-sub" id="np-sub"></div>
    </div>
    <div class="controls">
      <button id="shuffle" title="Shuffle">🔀</button>
      <button id="prev" title="Previous (Shift+Left)">⏮</button>
      <button id="play" title="Play/Pause (Space)">▶</button>
      <button id="next" title="Next (Shift+Right)">⏭</button>
      <button id="loop" title="Loop" data-mode="off">🔁</button>
    </div>
    <div class="progress">
      <span id="time-current">0:00</span>
      <input id="seek" type="range" min="0" max="100" value="0" step="0.1">
      <span id="time-total">0:00</span>
    </div>
    <div class="volume">
      <span>🔊</span>
      <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
    </div>
  </footer>
</div>

<audio id="audio" preload="metadata"></audio>
<script src="app.js"></script>
</body>
</html>
